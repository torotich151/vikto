<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#E91E63" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>ChatMe</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        background: #E91E63;
        overflow-x: hidden;
      }
      #root {
        height: 100%;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        background: transparent;
      }
      /* On desktop: show phone frame centered with shadow */
      @media (min-width: 600px) {
        html, body {
          background: #1a1a2e;
        }
        #root {
          align-items: center;
          min-height: 100vh;
          padding: 24px 16px;
        }
        .app-frame {
          box-shadow: 0 25px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.12);
          border-radius: 40px;
          overflow: hidden;
        }
      }
      /* Mobile: truly edge-to-edge */
      @media (max-width: 599px) {
        html, body, #root {
          height: 100dvh;
          min-height: 100dvh;
        }
        .app-frame {
          border-radius: 0 !important;
          min-height: 100dvh;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
